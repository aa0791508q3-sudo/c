<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>rouaa老師的簡易計算機</title>
<style>
  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(135deg, #fce4ec 0%, #f8bbd0 50%, #f48fb1 100%);
    font-family: 'Comic Sans MS', 'Chalkboard SE', cursive;
  }
  .calc-body {
    background: linear-gradient(160deg, #ffd6e8 0%, #ffb3d1 100%);
    border-radius: 36px;
    padding: 30px 26px 26px;
    box-shadow: 0 8px 0 #e87fb0, 0 14px 40px rgba(220,80,140,0.22);
    border: 3px solid #f9a8d4;
    width: 280px;
  }
  .deco {
    text-align: center;
    font-size: 20px;
    letter-spacing: 5px;
    margin-bottom: 6px;
    color: #db2777;
  }
  .calc-title {
    text-align: center;
    font-size: 15px;
    font-weight: 700;
    color: #9d174d;
    margin-bottom: 16px;
  }
  #disp {
    width: 100%;
    box-sizing: border-box;
    background: #fff0f7;
    border: 3px solid #f472b6;
    border-radius: 18px;
    padding: 12px 16px;
    font-size: 26px;
    font-family: 'Comic Sans MS', cursive;
    color: #831843;
    text-align: right;
    margin-bottom: 18px;
    outline: none;
    box-shadow: inset 0 2px 8px rgba(244,114,182,0.15);
  }
  .btn-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
  }
  .btn {
    height: 64px;
    border-radius: 20px;
    border: none;
    font-size: 22px;
    font-family: 'Comic Sans MS', cursive;
    font-weight: 700;
    cursor: pointer;
    transition: transform 0.1s, box-shadow 0.1s;
    outline: none;
  }
  .btn:active {
    transform: scale(0.91) translateY(4px);
    box-shadow: 0 1px 0 transparent !important;
  }
  .btn-num {
    background: #fff0f7;
    color: #9d174d;
    border: 2.5px solid #f9a8d4;
    box-shadow: 0 6px 0 #e879a8;
  }
  .btn-num:hover { background: #ffe4f0; }
  .btn-op {
    background: #fb7bb8;
    color: #fff;
    border: 2.5px solid #ec4899;
    box-shadow: 0 6px 0 #be185d;
  }
  .btn-op:hover { background: #f472b6; }
  .btn-eq {
    background: #e11d7a;
    color: #fff;
    border: 2.5px solid #9d174d;
    box-shadow: 0 6px 0 #831843;
    font-size: 24px;
  }
  .btn-eq:hover { background: #db2777; }
  .btn-clear {
    background: #fde68a;
    color: #92400e;
    border: 2.5px solid #fbbf24;
    box-shadow: 0 6px 0 #d97706;
  }
  .btn-clear:hover { background: #fcd34d; }
</style>
</head>
<body>
<div class="calc-body">
  <div class="deco">★ ♡ ★</div>
  <div class="calc-title">rouaa 老師的計算機</div>
  <input type="text" id="disp" readonly placeholder="0">
  <div class="btn-grid">
    <button class="btn btn-num" onclick="ap('7')">7</button>
    <button class="btn btn-num" onclick="ap('8')">8</button>
    <button class="btn btn-num" onclick="ap('9')">9</button>
    <button class="btn btn-op"  onclick="ap('/')">÷</button>

    <button class="btn btn-num" onclick="ap('4')">4</button>
    <button class="btn btn-num" onclick="ap('5')">5</button>
    <button class="btn btn-num" onclick="ap('6')">6</button>
    <button class="btn btn-op"  onclick="ap('*')">×</button>

    <button class="btn btn-num" onclick="ap('1')">1</button>
    <button class="btn btn-num" onclick="ap('2')">2</button>
    <button class="btn btn-num" onclick="ap('3')">3</button>
    <button class="btn btn-op"  onclick="ap('-')">−</button>

    <button class="btn btn-num" onclick="ap('0')">0</button>
    <button class="btn btn-clear" onclick="cl()">C</button>
    <button class="btn btn-eq"   onclick="calc()">=</button>
    <button class="btn btn-op"   onclick="ap('+')">+</button>
  </div>
</div>
<script>
  function ap(v){ var d=document.getElementById('disp'); if(d.value==='Error')d.value=''; d.value+=v; }
  function cl(){ document.getElementById('disp').value=''; }
  function calc(){ var d=document.getElementById('disp'); try{ d.value=eval(d.value); }catch(e){ d.value='Error'; } }
</script>
</body>
</html>
